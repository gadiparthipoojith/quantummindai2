<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Violet to Cyan gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Shield Background (Engineering Precision) -->
  <polygon points="100,20 170,60 170,140 100,180 30,140 30,60" 
           fill="#0C1222" 
           stroke="url(#brand-grad)" 
           stroke-width="4" 
           stroke-linejoin="round" />

  <!-- Anvil Base Shadow / Base -->
  <path d="M 60 140 H 140 L 130 150 H 70 Z" fill="#1A2332" />

  <!-- Anvil Fused with upward neural arrows -->
  <!-- We draw a stylized anvil body that tapers up -->
  <path d="M 50 120 C 50 120, 70 120, 80 100 C 80 100, 75 80, 70 80 H 130 C 125 80, 120 100, 120 100 C 130 120, 150 120, 150 120 M 50 120 H 150 L 140 140 H 60 Z" 
        fill="#1A2332" 
        stroke="url(#brand-grad)" 
        stroke-width="2.5" />

  <!-- Neural Constellation & Arrow Growth Nodes (Interconnected) -->
  <g filter="url(#glow)">
    <!-- Interconnecting neural pathways -->
    <line x1="100" y1="50" x2="65" y2="90" stroke="#06B6D4" stroke-width="2" />
    <line x1="100" y1="50" x2="135" y2="90" stroke="#6366F1" stroke-width="2" />
    <line x1="65" y1="90" x2="135" y2="90" stroke="#818CF8" stroke-width="2" stroke-dasharray="3,3" />
    <line x1="100" y1="50" x2="100" y2="110" stroke="#06B6D4" stroke-width="2" />

    <!-- Center Top Node (Growth Target / Arrow Tip) -->
    <circle cx="100" cy="50" r="10" fill="url(#brand-grad)" stroke="#F8FAFC" stroke-width="2" />
    
    <!-- Left Node -->
    <circle cx="65" cy="90" r="7" fill="#06B6D4" stroke="#F8FAFC" stroke-width="1.5" />
    
    <!-- Right Node -->
    <circle cx="135" cy="90" r="7" fill="#6366F1" stroke="#F8FAFC" stroke-width="1.5" />

    <!-- Core/Data Node (Surya's Data Core) -->
    <circle cx="100" cy="110" r="5" fill="#F59E0B" stroke="#F8FAFC" stroke-width="1" />
  </g>
</svg>
